# Desktop Nanny configuration

# Inference device: "cpu" or "cuda"
device: cpu

# YOLOv8 model weights (downloaded automatically by ultralytics on first run)
model: yolov8n.pt

# Target capture frame rate
fps: 10

# Metrics HTTP port (Prometheus scrapes this)
metrics_port: 8000

# Detection rules — evaluated against every frame
rules:
  - object: cell phone
    confidence_threshold: 0.6
    actions:
      - alert
      - log

  - object: person
    confidence_threshold: 0.5
    actions:
      - log

  - object: laptop
    confidence_threshold: 0.65
    actions:
      - log

  # Example block rule — uncomment and set process_names to use
  # - object: cell phone
  #   confidence_threshold: 0.7
  #   actions:
  #     - block
  #   process_names:
  #     - slack
  #     - discord

# Path for log-action output
log_path: nanny.log
